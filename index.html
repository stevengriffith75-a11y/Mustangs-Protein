<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mustangs Protein">
<meta name="theme-color" content="#1a3a8f">
<title>Mustangs Protein Check-Off</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700&family=Barlow:wght@400;500&display=swap');

  :root {
    --blue: #1a3a8f;
    --blue-dark: #122a6e;
    --blue-light: #e8edf8;
    --white: #ffffff;
    --gray: #f4f5f7;
    --border: #dde1ea;
    --text: #1a1f2e;
    --muted: #6b7280;
    --checked-bg: #1a3a8f;
    --checked-text: #ffffff;
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    font-family: 'Barlow', sans-serif;
    background: var(--gray);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
  }

  /* HEADER */
  .header {
    background: var(--blue);
    color: var(--white);
    padding: 48px 16px 14px;
    text-align: center;
    position: sticky;
    top: 0;
    z-index: 100;
    border-bottom: 3px solid var(--white);
  }
  .header-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 22px;
    font-weight: 700;
    letter-spacing: .5px;
    text-transform: uppercase;
  }
  .header-sub {
    font-size: 12px;
    opacity: .75;
    margin-top: 2px;
  }

  /* DAY TABS */
  .day-tabs {
    display: flex;
    gap: 6px;
    padding: 10px 12px 6px;
    overflow-x: auto;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  .day-tabs::-webkit-scrollbar { display: none; }
  .day-tab {
    flex-shrink: 0;
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--muted);
    cursor: pointer;
    white-space: nowrap;
  }
  .day-tab.active {
    background: var(--blue);
    color: var(--white);
    border-color: var(--blue);
  }
  .day-tab.today-marker {
    border-color: var(--blue);
    color: var(--blue);
  }

  /* STATS */
  .stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 10px 12px 6px;
    background: var(--white);
  }
  .stat {
    background: var(--gray);
    border-radius: var(--radius);
    padding: 8px 6px;
    text-align: center;
  }
  .stat-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 26px;
    font-weight: 700;
    color: var(--blue);
    line-height: 1;
  }
  .stat-lbl {
    font-size: 10px;
    color: var(--muted);
    margin-top: 2px;
    text-transform: uppercase;
    letter-spacing: .4px;
  }

  /* PROGRESS */
  .progress-wrap {
    background: var(--white);
    padding: 6px 12px 10px;
  }
  .progress-bar {
    height: 6px;
    background: var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--blue);
    border-radius: 3px;
    transition: width .3s ease;
  }

  /* CONTROLS */
  .controls {
    display: flex;
    gap: 8px;
    padding: 8px 12px;
    background: var(--white);
    border-bottom: 1px solid var(--border);
    border-top: 1px solid var(--border);
    position: sticky;
    top: 95px;
    z-index: 99;
  }
  .search-wrap {
    flex: 1;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    font-family: 'Barlow', sans-serif;
    font-size: 14px;
    padding: 8px 32px 8px 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--gray);
    color: var(--text);
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--blue); background: var(--white); }
  .clear-btn {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: var(--muted);
    font-size: 16px;
    line-height: 1;
    display: none;
  }
  .grade-select {
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    background: var(--gray);
    color: var(--text);
    outline: none;
    min-width: 110px;
  }

  /* NAME GRID */
  .grade-section { padding: 0 12px; }
  .grade-heading {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: var(--blue);
    padding: 12px 0 6px;
    border-bottom: 1.5px solid var(--blue-light);
    margin-bottom: 8px;
  }
  .name-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 6px;
    margin-bottom: 12px;
  }
  .name-btn {
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 500;
    padding: 10px 32px 10px 12px;
    border-radius: var(--radius);
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--text);
    text-align: left;
    cursor: pointer;
    position: relative;
    line-height: 1.3;
    transition: transform .1s, background .15s, border-color .15s;
    -webkit-user-select: none;
  }
  .name-btn:active { transform: scale(0.96); }
  .name-btn.checked {
    background: var(--blue);
    color: var(--white);
    border-color: var(--blue);
  }
  .name-btn .check-icon {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
    color: var(--white);
    opacity: 0;
    transition: opacity .15s;
  }
  .name-btn.checked .check-icon { opacity: 1; }

  /* UNDO BAR */
  .undo-bar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--white);
    border-top: 1px solid var(--border);
    padding: 10px 12px calc(10px + env(safe-area-inset-bottom));
    display: flex;
    align-items: center;
    justify-content: space-between;
    z-index: 200;
  }
  .undo-msg { font-size: 13px; color: var(--muted); }
  .undo-btn {
    font-family: 'Barlow', sans-serif;
    font-size: 13px;
    font-weight: 500;
    color: var(--blue);
    background: var(--blue-light);
    border: none;
    border-radius: var(--radius);
    padding: 6px 14px;
    cursor: pointer;
    display: none;
  }

  .scroll-body { padding-bottom: 70px; }
  .empty-msg { padding: 32px 12px; text-align: center; color: var(--muted); font-size: 14px; }

  /* INSTALL BANNER */
  .install-banner {
    background: var(--blue-light);
    border: 1.5px solid var(--blue);
    border-radius: var(--radius);
    margin: 10px 12px 0;
    padding: 10px 12px;
    font-size: 13px;
    color: var(--blue-dark);
    display: none;
  }
  .install-banner strong { display: block; font-weight: 600; margin-bottom: 2px; }
  .install-banner .dismiss {
    float: right;
    background: none;
    border: none;
    cursor: pointer;
    font-size: 16px;
    color: var(--blue);
    margin-top: -2px;
  }
</style>
</head>

<div class="header">
  <div class="header-title">🐴 Friendswood Mustangs Football</div>
  <div class="header-sub">Protein Check-Off &nbsp;·&nbsp; <span id="weekLabel"></span></div>
</div>

<div class="day-tabs" id="dayTabs"></div>

  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>
</div>

<div class="controls">
  <div class="search-wrap">
    <input type="search" id="searchBox" placeholder="Search player..." oninput="filterNames()" autocomplete="off" autocorrect="off" spellcheck="false">
    <button class="clear-btn" id="clearBtn" onclick="clearSearch()">✕</button>
  </div>
  <select class="grade-select" id="gradeFilter" onchange="filterNames()">
    <option value="all">All grades</option>
    <option value="9">9th Grade</option>
    <option value="10">10th Grade</option>
    <option value="11">11th Grade</option>
  </select>
</div>

<div class="install-banner" id="installBanner">
  <button class="dismiss" onclick="document.getElementById('installBanner').style.display='none'">✕</button>
  <strong>Add to Home Screen</strong>
  Tap the share button <strong>⎋</strong> then "Add to Home Screen" to use this as an app.
</div>

<div class="scroll-body" id="rosterBody"></div>

<div class="undo-bar">
  <span class="undo-msg" id="undoMsg">Tap a name to check them off</span>
  <button class="undo-btn" id="undoBtn" onclick="undo()">↩ Undo</button>
</div>

function getWeekDays() {
  const now = new Date();
  const day = now.getDay();
  const monday = new Date(now);
  monday.setDate(now.getDate() - (day === 0 ? 6 : day - 1));
  return ['Mon','Tue','Wed','Thu','Fri'].map((n, i) => {
    const d = new Date(monday);
    d.setDate(monday.getDate() + i);
    return { label: n + ' ' + (d.getMonth()+1) + '/' + d.getDate(), key: 'day'+i, date: d };
  });
}

function getWeekLabel(days) {
  const f = days[0].date, l = days[4].date;
  const mo = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  return f.getMonth()===l.getMonth()
    ? 'Week of '+mo[f.getMonth()]+' '+f.getDate()+' – '+l.getDate()+', '+l.getFullYear()
    : 'Week of '+mo[f.getMonth()]+' '+f.getDate()+' – '+mo[l.getMonth()]+' '+l.getDate()+', '+l.getFullYear();
}

const DAYS = getWeekDays();
const todayStr = new Date().toDateString();
const todayIdx = DAYS.findIndex(d => d.date.toDateString() === todayStr);

document.getElementById('weekLabel').textContent = getWeekLabel(DAYS);

let activeDay = todayIdx >= 0 ? DAYS[todayIdx].key : DAYS[0].key;
const checked = {};
DAYS.forEach(d => { checked[d.key] = new Set(); });
let lastAction = null;

function buildDayTabs() {
  const tabs = document.getElementById('dayTabs');
  tabs.innerHTML = '';
  DAYS.forEach((d, i) => {
    const btn = document.createElement('button');
    btn.className = 'day-tab' + (d.key === activeDay ? ' active' : (i === todayIdx ? ' today-marker' : ''));
    btn.textContent = d.label + (i === todayIdx ? ' ●' : '');
    btn.onclick = () => { activeDay = d.key; buildDayTabs(); renderRoster(); updateStats(); };
    tabs.appendChild(btn);
  });
}

function renderRoster() {
  const body = document.getElementById('rosterBody');
  const q = document.getElementById('searchBox').value.toLowerCase();
  const gradeFilter = document.getElementById('gradeFilter').value;
  body.innerHTML = '';

  const grades = gradeFilter === 'all' ? [9,10,11] : [parseInt(gradeFilter)];
  let anyVisible = false;

  grades.forEach(g => {
    const players = ROSTER.map((p,i) => ({...p,idx:i}))
      .filter(p => p.grade === g && (!q || p.name.toLowerCase().includes(q)));
    if(!players.length) return;
    anyVisible = true;

    const section = document.createElement('div');
    section.className = 'grade-section';

    const heading = document.createElement('div');
    heading.className = 'grade-heading';
    heading.textContent = g + 'th Grade — ' + players.length + ' players';
    section.appendChild(heading);

    const grid = document.createElement('div');
    grid.className = 'name-grid';

    players.forEach(p => {
      const btn = document.createElement('button');
      btn.className = 'name-btn' + (checked[activeDay].has(p.idx) ? ' checked' : '');
      btn.innerHTML = p.name + '<span class="check-icon">✓</span>';
      btn.onclick = () => toggleCheck(p.idx, btn, p.name);
      grid.appendChild(btn);
    });

    section.appendChild(grid);
    body.appendChild(section);
  });

  if(!anyVisible) {
    const msg = document.createElement('div');
    msg.className = 'empty-msg';
    msg.textContent = 'No players found';
    body.appendChild(msg);
  }
}

function toggleCheck(idx, btn, name) {
  const s = checked[activeDay];
  if(s.has(idx)) {
    s.delete(idx); btn.classList.remove('checked');
    lastAction = {type:'uncheck',idx,name}; showUndo(name + ' unchecked');
  } else {
    s.add(idx); btn.classList.add('checked');
    lastAction = {type:'check',idx,name}; showUndo(name + ' ✓ got protein!');
  }
  updateStats();
}

function updateStats() {
  const total = ROSTER.length, done = checked[activeDay].size;
  document.getElementById('checkedCount').textContent = done;
  document.getElementById('remainCount').textContent = total - done;
  document.getElementById('pctCount').textContent = Math.round(done/total*100) + '%';
  document.getElementById('progressFill').style.width = Math.round(done/total*100) + '%';
}

function showUndo(msg) {
  document.getElementById('undoMsg').textContent = msg;
  document.getElementById('undoBtn').style.display = 'block';
  clearTimeout(window._ut);
  window._ut = setTimeout(() => { document.getElementById('undoBtn').style.display='none'; lastAction=null; }, 6000);
}

function undo() {
  if(!lastAction) return;
  const {type,idx} = lastAction;
  if(type==='check') checked[activeDay].delete(idx); else checked[activeDay].add(idx);
  lastAction = null;
  document.getElementById('undoBtn').style.display = 'none';
  document.getElementById('undoMsg').textContent = 'Tap a name to check them off';
  renderRoster(); updateStats();
}

function filterNames() {
  const q = document.getElementById('searchBox').value;
  document.getElementById('clearBtn').style.display = q ? 'block' : 'none';
  renderRoster();
}

function clearSearch() {
  document.getElementById('searchBox').value = '';
  document.getElementById('clearBtn').style.display = 'none';
  renderRoster();
}

// Show install banner on iOS Safari
const isIos = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isInStandalone = window.navigator.standalone;
if(isIos && !isInStandalone) {
  document.getElementById('installBanner').style.display = 'block';
}

buildDayTabs();
renderRoster();
updateStats();
</script>
